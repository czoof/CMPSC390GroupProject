<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Sign In - LegacyAuto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/global-ui.css">
    <script src="/sessionManager.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #07090f; min-height: 100vh; display: flex; flex-direction: column; }
        .hero-bg { position: fixed; inset: 0; background: radial-gradient(ellipse at 18% 35%, rgba(79,144,240,0.13) 0%, transparent 50%), radial-gradient(ellipse at 82% 70%, rgba(212,168,67,0.07) 0%, transparent 45%), linear-gradient(160deg, #0c1428 0%, #07090f 100%); z-index: 0; }
        nav { position: relative; z-index: 10; display: flex; align-items: center; justify-content: space-between; padding: 20px 48px; height: 66px; background: rgba(7,9,15,0.6); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(79,144,240,0.1); }
        .nav-brand { font-family: 'Orbitron', monospace; font-size: 1.25rem; font-weight: 900; letter-spacing: 4px; color: #fff; text-decoration: none; text-transform: uppercase; }
        .nav-brand span { color: #4f90f0; }
        .nav-back { padding: 8px 24px; background: rgba(79,144,240,0.1); border: 1px solid rgba(79,144,240,0.3); border-radius: 50px; color: rgba(175,200,245,0.8); cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: all 0.2s ease; font-family: 'Inter', sans-serif; }
        .nav-back:hover { background: rgba(79,144,240,0.2); color: #fff; }
        .container { position: relative; z-index: 1; flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .auth-card { background: rgba(12,20,40,0.6); border: none; border-radius: 24px; padding: 52px 48px; width: 100%; max-width: 440px; box-shadow: 0 0 60px rgba(79,144,240,0.25), 0 20px 40px rgba(0,0,0,0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .auth-card h1 { font-family: 'Orbitron', monospace; font-size: 1.8rem; font-weight: 900; color: #fff; text-align: center; margin-bottom: 12px; letter-spacing: 1px; }
        .auth-card .role-badge { text-align: center; display: inline-block; width: 100%; color: rgba(212,168,67,0.95); font-size: 0.85rem; font-weight: 700; margin-bottom: 24px; letter-spacing: 1.5px; text-transform: uppercase; }
        .auth-card p { text-align: center; color: rgba(175,200,245,0.7); font-size: 0.95rem; margin-bottom: 32px; }
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; color: rgba(175,200,245,0.9); font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; letter-spacing: 0.3px; }
        .form-group input { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.06); border: none; border-radius: 10px; color: #fff; font-family: 'Inter', sans-serif; font-size: 0.95rem; transition: all 0.25s ease; }
        .form-group input::placeholder { color: rgba(79,144,240,0.4); }
        .form-group input:focus { outline: none; background: rgba(79,144,240,0.15); border: none; box-shadow: 0 0 0 2px rgba(79,144,240,0.4), inset 0 0 12px rgba(79,144,240,0.1); }
        .submit-btn { width: 100%; padding: 14px 20px; background: linear-gradient(135deg, #4f90f0 0%, #6faeff 100%); border: none; border-radius: 12px; color: #fff; font-size: 1rem; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 0 20px rgba(79,144,240,0.5), 0 8px 24px rgba(79,144,240,0.3); letter-spacing: 0.3px; margin-top: 8px; }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 0 35px rgba(79,144,240,0.7), 0 12px 32px rgba(79,144,240,0.4); }
        .submit-btn:active { transform: translateY(-1px); }
        .message { font-size: 0.9rem; margin-top: 16px; text-align: center; padding: 10px; border-radius: 8px; }
        .error-msg { background: rgba(255,107,107,0.1); color: #ff8787; border: 1px solid rgba(255,107,107,0.3); }
        .success-msg { background: rgba(81,207,102,0.1); color: #51cf66; border: 1px solid rgba(81,207,102,0.3); }
    </style>
</head>
<body>
    <div class="hero-bg"></div>
    <nav>
        <a class="nav-brand" href="/">LEGACY<span>AUTO</span></a>
        <button class="nav-back" onclick="window.location.href='/index.html'">← Return Home</button>
    </nav>
    <div class="container">
        <div class="auth-card">
            <h1>Employee Portal</h1>
            <div class="role-badge">STAFF ACCESS</div>
            <p>Sign in to manage parts and trades</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Employee ID</label>
                    <input type="text" id="username" name="username" placeholder="Enter your employee ID" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="submit-btn">Sign In</button>
            </form>
            <div id="loginResult"></div>
        </div>
    </div>
    <script>
        const form = document.getElementById("loginForm");
        const loginResult = document.getElementById("loginResult");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const employeeID = document.querySelector('input[name="username"]').value.trim();
            const password = document.querySelector('input[name="password"]').value;

            try {
                const res = await fetch("/Employeelogin", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ EmployeeID: employeeID, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    loginResult.innerHTML = `<div class="message error-msg">❌ ${data.message || "Login failed"}</div>`;
                    return;
                }

                // Use SessionManager to store employee session
                SessionManager.setUser('employee', {
                    employeeId: data.employeeId,
                    firstName: data.firstName,
                    lastName: data.lastName,
                    isManager: data.isManager
                });

                loginResult.innerHTML = `<div class="message success-msg">✓ Redirecting...</div>`;

                // Redirect based on manager status
                const redirectUrl = data.isManager 
                    ? `/Sprint2Alberto/ManagerDashboardPage.html?EmployeeID=${data.employeeId}&name=${encodeURIComponent(data.firstName + ' ' + data.lastName)}`
                    : `/Sprint2Alberto/EmployeeDashboardPage.html?EmployeeID=${data.employeeId}&name=${encodeURIComponent(data.firstName + ' ' + data.lastName)}`;
                
                setTimeout(() => window.location.replace(redirectUrl), 500);

            } catch (err) {
                console.error(err);
                loginResult.innerHTML = `<div class="message error-msg">❌ Server error. Please try again.</div>`;
            }
        });
    </script>
</body>
</html>
