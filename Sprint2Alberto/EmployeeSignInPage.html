<!DOCTYPE html>
<html>
    <head>
        <title>Employee SignIn Page</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="styles.css">
        <script src="/sessionManager.js"></script>
    </head>
    
    <body>
        <header><h1>Legacy Auto Company</h1></header>
        
        <div class = "container" style="justify-content: center;">
            <div>
               <h2>Employee SignIn Page</h2>

                <h2>Login</h2>
                    <form id="loginForm">
                    <label>Username</label><br />
                    <input type="text" name="username" required /><br /><br />
                    <label>Password</label><br />
                    <input type="password" name="password" required /><br /><br />
                    <button type="submit">Login</button>
                    </form>
                    <p id="loginResult"></p>

                <button onclick = "window.location.href='/index.html'">Go back</button> 
            </div>
            
        </div>

        <footer><h2>This is legacy Auto Comp!!!!! we are excited to bring you a new perspective on creativity and hope to make your vision a reality</h2></footer>

    </body>

    <script>
        const form = document.getElementById("loginForm");
        const loginResult = document.getElementById("loginResult");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const employeeID = document.querySelector('input[name="username"]').value.trim();
            const password = document.querySelector('input[name="password"]').value;

            try {
                const res = await fetch("/Employeelogin", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ EmployeeID: employeeID, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    loginResult.textContent = data.message || "Login failed";
                    loginResult.style.color = "red";
                    return;
                }

                // Use SessionManager to store employee session
                SessionManager.setUser('employee', {
                    employeeId: data.employeeId,
                    firstName: data.firstName,
                    lastName: data.lastName,
                    isManager: data.isManager
                });

                loginResult.textContent = "Login successful!";
                loginResult.style.color = "green";

                // Redirect based on manager status
                const redirectUrl = data.isManager 
                    ? "/Sprint2Alberto/ManagerDashboardPage.html" 
                    : "/Sprint2Alberto/EmployeeDashboardPage.html";
                
                setTimeout(() => window.location.replace(redirectUrl), 500);

            } catch (err) {
                console.error(err);
                loginResult.textContent = "Server error. Check backend console.";
                loginResult.style.color = "red";
            }
        });
    </script>

</html>
