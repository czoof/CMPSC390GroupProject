<!DOCTYPE html>
<html>
<head>
    <title>Previous Builds Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/global-ui.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #07090f; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }
        .page-bg { position: fixed; inset: 0; background: radial-gradient(ellipse at 18% 35%, rgba(79,144,240,0.08) 0%, transparent 50%), radial-gradient(ellipse at 82% 70%, rgba(212,168,67,0.04) 0%, transparent 45%), linear-gradient(160deg, #0c1428 0%, #07090f 100%); z-index: 0; }
        header { position: relative; z-index: 10; display: flex; align-items: center; justify-content: center; padding: 24px; font-family: 'Orbitron', monospace; font-size: 1.25rem; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; }
        header span { color: #4f90f0; }
        .content-box { position: relative; z-index: 1; max-width: 720px; margin: 40px auto; padding: 48px; background: rgba(12,20,40,0.45); border: none; border-radius: 24px; box-shadow: 0 0 60px rgba(79,144,240,0.2), 0 20px 40px rgba(0,0,0,0.5); }
        .content-box h2 { font-family: 'Orbitron', monospace; font-size: 1.6rem; font-weight: 900; margin-bottom: 12px; }
        .content-box p { color: rgba(175,200,245,0.7); font-size: 0.95rem; margin-bottom: 24px; }
        .history-section { margin-top: 32px; }
        .history-section h3 { font-size: 1.1rem; margin-bottom: 16px; color: #4f90f0; }
        .history-card { background: rgba(79,144,240,0.08); border: none; border-radius: 12px; padding: 16px; margin-bottom: 12px; color: rgba(175,200,245,0.8); }
        .history-card strong { color: #fff; }
        .empty-state { color: rgba(175,200,245,0.6); font-size: 0.9rem; }
        button { padding: 12px 28px; background: linear-gradient(135deg, #4f90f0 0%, #6faeff 100%); border: none; border-radius: 10px; color: #fff; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.95rem; transition: all 0.3s ease; box-shadow: 0 0 20px rgba(79,144,240,0.4); margin-top: 24px; }
        button:hover { transform: translateY(-3px); box-shadow: 0 0 35px rgba(79,144,240,0.6), 0 8px 16px rgba(79,144,240,0.3); }
        footer { position: relative; z-index: 1; text-align: center; padding: 32px 24px; border-top: 1px solid rgba(79,144,240,0.1); color: rgba(175,200,245,0.6); font-size: 0.85rem; margin-top: auto; }
    </style>
</head>

<body>
<div class="page-bg"></div>
<header>LEGACY<span>AUTO</span></header>

<div class="content-box">
    <h2>Previous Builds Page</h2>
    <p>View previously created vehicle builds here.</p>

    <div class="history-section">
        <h3>Deleted Builds</h3>
        <div id="deletedBuilds" class="empty-state">Loading deleted builds...</div>
    </div>

    <div class="history-section">
        <h3>Bought Builds</h3>
        <div id="boughtBuilds" class="empty-state">Loading bought builds...</div>
    </div>

    <button onclick="window.location.href='/Sprint2-Charles/CustomerDashboard.html?userId=' + localStorage.getItem('userId')">
        Back to Dashboard
    </button>
</div>

<footer>
Parts Trading & Vehicle Customization Platform
</footer>

<script>
const userId = localStorage.getItem("userId");
const API_BASE = `${window.location.protocol}//${window.location.hostname}:3000`;

if (!userId) {
    window.location.replace("/Sprint2Alberto/CustomerSingInPage.html");
}

function renderBuildSection(containerId, builds, emptyMessage) {
    const container = document.getElementById(containerId);
    container.innerHTML = "";

    if (!Array.isArray(builds) || builds.length === 0) {
        container.textContent = emptyMessage;
        container.className = "empty-state";
        return;
    }

    container.className = "";

    builds.forEach((build) => {
        const partsText = Array.isArray(build.Parts) && build.Parts.length
            ? build.Parts.map((part) => `${part.Name} (ID: ${part.PartID})`).join(", ")
            : (build.PartID ? `Part ${build.PartID}` : "None");

        const card = document.createElement("div");
        card.className = "history-card";
        card.innerHTML =
            `<strong>Vehicle:</strong> ${build.BaseCar}` +
            `<br><strong>Total Price:</strong> $${build.TotalPrice}` +
            `<br><strong>Parts:</strong> ${partsText}`;

        container.appendChild(card);
    });
}

async function loadHistory() {
    try {
        const res = await fetch(`${API_BASE}/cars/history/${userId}`);
        const history = await res.json();

        renderBuildSection("deletedBuilds", history.deleted, "No deleted builds yet.");
        renderBuildSection("boughtBuilds", history.bought, "No bought builds yet.");
    } catch (err) {
        console.error(err);
        document.getElementById("deletedBuilds").textContent = "Could not load deleted builds.";
        document.getElementById("boughtBuilds").textContent = "Could not load bought builds.";
    }
}

loadHistory();
</script>

</body>
</html>
