                async function calendar() {
                    const params = new URLSearchParams(window.location.search);
                    const employeeID = params.get("EmployeeID");
                    const res = await fetch(`/getSchedule?EmployeeID=${employeeID}`);
                    const data = await res.json();
                    const calendarDiv = document.getElementById("calendar");
                    const year = currentDate.getFullYear();
                    const month = currentDate.getMonth();
                    const firstDay = new Date(year, month, 1).getDay();
                    const lastDate = new Date(year, month + 1, 0).getDate();

                    let html = `
                        <div class="calendar-header">
                            <button onclick="changeMonth(-1)">Previous Month</button>
                            <h2>${currentDate.toLocaleString("default", { month: "long" })} ${currentDate.getFullYear()}</h2>
                            <button onclick="changeMonth(1)">Next Month</button>
                        </div>
                    
                        <div class="calendar-days">
                            <div>Sun</div>
                            <div>Mon</div>
                            <div>Tue</div>
                            <div>Wed</div>
                            <div>Thu</div>
                            <div>Fri</div>
                            <div>Sat</div>
                        </div>
                        
                        <div class="calendar-grid">`;

                    for (let i = 0; i < 42; i++) {
                        let dayNumber = i - firstDay + 1;
                        let displayNumber = dayNumber;
                        let isCurrentMonth = true;
                        if (dayNumber <= 0) {   /*Month before*/
                            const prevMonthLastDate = new Date(year, month, 0).getDate();
                            displayNumber = prevMonthLastDate + dayNumber;
                            isCurrentMonth = false;
                        }   
                        else if (dayNumber > lastDate) {    /*Month After*/
                            displayNumber = dayNumber - lastDate;
                            isCurrentMonth = false;
                        }
                        let worked = false;
                        let display = "";

                        if (isCurrentMonth) {
                            const jsDay = new Date(year, month, dayNumber).getDay();
                            const map = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
                            const dayName = map[jsDay];
                            const week = Math.ceil((dayNumber + firstDay) / 7);

                            data.forEach(emp => {
                                if (
                                    Number(emp.MonthNum) === (month + 1) &&
                                    Number(emp.WeekNum) === week &&
                                    emp[dayName]
                                ) {worked = true;}
                            });

                            display = `<div>${displayNumber}</div>
                                <div>${worked ? "✅" : "❌"}</div>`;
                        } else {
                            display = `<div>${displayNumber}</div>`;
                        }
                        html += `<div class="day ${!isCurrentMonth ? "inactive" : worked ? "worked" : "off"}">${display}</div>`;
                    }
                    html += `</div>`;
                    calendarDiv.innerHTML = html;
                }

                async function loadTaxInfo(){
                    const params = new URLSearchParams(window.location.search);
                    const employeeID = params.get("EmployeeID");
                    const res = await fetch(`/getSchedule?EmployeeID=${employeeID}`);
                    const data = await res.json();
                    const currentMonth = currentDate.getMonth() + 1;

                    const weeks = [...new Set(
                        data
                        .filter(row => Number(row.MonthNum) === (currentDate.getMonth() + 1))
                        .map(row => Number(row.WeekNum))
                    )]
                    .filter(w => w <= 5)
                    .sort((a, b) => a - b);

                    let weekButtons = "";   /*builds the week buttons*/
                    weeks.forEach(w => {
                        weekButtons += `<button onclick="loadPaystub(${w})" style="width:120px;height:30px">Week ${w}</button>`;
                    });

                    document.getElementById("InteractiveDisplay").innerHTML = `
                        <h2>Tax Information</h2>
                        <div>
                            <button onclick="changeMonth(-1)">Last Month</button>
                            <span id="monthLabel">
                                ${currentDate.toLocaleString("default", { month: "long" })}
                            </span>
                            <button onclick="changeMonth(1)">Next Month</button>
                        </div>
                        <br><br>
                        <div>${weekButtons || "No schedule for this month"}</div>
                        <br><br>
                        <div id="PaystubTable"></div>
                    `;
                }

                async function loadPaystub(week){
                    const params = new URLSearchParams(window.location.search);
                    const employeeID = params.get("EmployeeID");
                    const res = await fetch(`/getSchedule?EmployeeID=${employeeID}`);
                    const data = await res.json();
                    /*const schedule = data.find(row => row.WeekNum == week);*/
                    const schedule = data.find(row => row.WeekNum == week && row.MonthNum == (currentDate.getMonth() + 1));
                    
                    if(!schedule){
                        document.getElementById("PaystubTable").innerHTML = "No schedule found.";
                        return;
                    }
                    let daysWorked = 0;                 /*Checks how many days the employee worked*/
                    if(schedule.Mon) daysWorked++;
                    if(schedule.Tue) daysWorked++;
                    if(schedule.Wed) daysWorked++;
                    if(schedule.Thu) daysWorked++;
                    if(schedule.Fri) daysWorked++;
                    if(schedule.Sat) daysWorked++;
                    if(schedule.Sun) daysWorked++;
                    
                    const payRes = await fetch(`/getEmployeePay?EmployeeID=${employeeID}`); /*all for the pay data*/
                    const payData = await payRes.json();
                    const hourlyPay = payData.HourlyPay;
                    const hoursWorked = daysWorked * 8;
                    const grossPay = hoursWorked * hourlyPay;
                    const federal = grossPay * 0.12;
                    const state = grossPay * 0.09;
                    const social = grossPay * 0.03;
                    const medicare = grossPay * 0.016;
                    const totalTaxes = federal + state + social + medicare;
                    const netPay = grossPay - totalTaxes;
                    document.getElementById("PaystubTable").innerHTML = `
                    
                    <table border="1">
                        <tr><th>Days Worked</th> <th>Hours Worked</th> <th>Hourly Pay</th> <th>Gross Pay</th> </tr>
                        <tr>
                            <td>${daysWorked}</td>
                            <td>${hoursWorked}</td>
                            <td>$${hourlyPay}</td>
                            <td>$${grossPay.toFixed(2)}</td>
                        </tr>
                    </table>
                    <table border="1">
                        <tr> <th>Federal Income Tax</th> <th>State Income Tax</th> <th>Social Security</th> <th>Medicare</th> <th>Total Taxes</th> <th>Net Pay</th> </tr>
                        <tr>
                            <td>$${federal.toFixed(2)}</td>
                            <td>$${state.toFixed(2)}</td>
                            <td>$${social.toFixed(2)}</td>
                            <td>$${medicare.toFixed(2)}</td>
                            <td>$${totalTaxes.toFixed(2)}</td>
                            <td>$${netPay.toFixed(2)}</td>
                        </tr>
                    </table>
                    `;
                }

                        /*Aprove/deny Essentials*/

                        async function giveRaise(employeeID){

                            if(!raise || raise <= 0){

                            await fetch("/giveRaise",{
                                method:"POST",
                                headers:{"Content-Type":"application/json"},
                                body:JSON.stringify({

                                    raise:raise
                                })
                            });
                            alert("Raise Submitted");
                            viewRecognition(employeeID);
                        }

                            }
                            await fetch("/recognitionComment",{
                                method:"POST",

                                    comment:comment

                            viewRecognition(employeeID);
                        }

                /*Password change*/
                function loadChangePassword(){
                    document.getElementById("InteractiveDisplay").innerHTML = `

                        <br><br>
                        <label>New Password</label><br>

                        <br><br>

                        <p id="passwordResult"></p>
                    `;
                }
                
                async function changePassword(){
                    const params = new URLSearchParams(window.location.search);
                    const EmployeeID = params.get("EmployeeID");
                    const oldPassword = document.getElementById("oldPassword").value;
                    const newPassword = document.getElementById("newPassword").value;
                    const res = await fetch("/changePassword",{
                        method:"POST",
                        headers:{"Content-Type":"application/json"},
                        body:JSON.stringify({
                            EmployeeID:EmployeeID,
                            oldPassword:oldPassword,
                            newPassword:newPassword
                        })
                    });
                    const text = await res.text();
                    document.getElementById("passwordResult").innerText = text;
                }
        </script>
