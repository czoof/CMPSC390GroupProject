<!DOCTYPE html>
<html>
    <head>
        <title>Manager Dashboard Page</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="styles.css">
    </head>
    
    <body>
        <header><h1>Legacy Auto Company</h1></header>
        
        <div class = "container" style="justify-content: center;">
            <div>
               <h2 id="welcome">Hello Manager</h2>

                <button onclick = "window.location.href='index.html'">Go back</button> 
            
            </div>
            
        </div>

        <footer><h2>This is legacy Auto Comp!!!!! we are excited to bring you a new perspective on creativity and hope to make your vision a reality</h2></footer>
            <script>
                window.onload = function(){
                    const params = new URLSearchParams(window.location.search);
                    const name = params.get("name");
                    console.log(name);
                    if (name){
                        document.getElementById("welcome").textContent = "Hello " + name;
                    }
                };    
        </script>
    </body>
</html>
