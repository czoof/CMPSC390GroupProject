
<!--This will be the UI where users can select there parts-->

<!DOCTYPE html>
<html>
<head>
  <title>Pick a Part</title>
  <style>
    body { font-family: Arial; }
    .part { margin-bottom: 10px; }
    .out { color: red; }
  </style>
</head>
<body>

<h1>Pick a Part</h1>

<!--Thelabels-->

<label>
  <input type="checkbox" id="inStockCheckbox">
  In Stock Only
</label>

<label>
  <input type="checkbox" id="bufferCheckbox">
  buffer
</label>

<label>
  <input type="checkbox" id="paintCheckbox">
  paint
</label>

<!--Parts will be display with all information-->
<h2>Parts</h2>
<h5>Select the parts you want to modify your dream car</h5>
<div id="partsContainer"></div>
<!--selected parts will be stored here-->
<h2>Cart (going to car)</h2>
<div id="cartContainer"></div>

<script>
let parts = [];
let cart = [];

// Geting parts from backend
function fetchParts(inStock = false) {
  let url = "http://localhost:3000/api/parts";

  if (inStock) {
    url += "?inStock=true";
  }

  fetch(url)
    .then(res => res.json())
    .then(data => {
      parts = data;
      displayParts();
    })
    .catch(err => console.error(err));
}

// visual parts
function displayParts() {
  const container = document.getElementById("partsContainer");
  container.innerHTML = "";

  parts.forEach(part => {
    const div = document.createElement("div");
    div.className = "part";

    const name = document.createElement("span");
    name.textContent = part.name + " ";

    const button = document.createElement("button");
//show out of stock if parts aren't avaible
    if (part.stock_quantity === 0) {
      button.textContent = "Out of Stock";
      button.disabled = true;
      name.classList.add("out");
    } else {
      button.textContent = "Add to Cart";
      button.onclick = () => addToCart(part);
    }

    div.appendChild(name);
    div.appendChild(button);
    container.appendChild(div);
  });
}

// Storing parts into a cart system to be used for the car
function addToCart(part) {
  const exists = cart.find(item => item.id === part.id);

  if (!exists) {
    cart.push(part);
    displayCart();
  }
}

// Display saved parts
function displayCart() {
  const container = document.getElementById("cartContainer");
  container.innerHTML = "";

  cart.forEach(item => {
    const div = document.createElement("div");
    div.textContent = item.name;
    container.appendChild(div);
  });
}

// Checkbox filter
document.getElementById("inStockCheckbox")
  .addEventListener("change", function() {
    fetchParts(this.checked);
  });

// Initial load
fetchParts();
</script>

</body>
</html>
