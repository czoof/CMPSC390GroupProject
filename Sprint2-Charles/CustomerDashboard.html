<!DOCTYPE html>
<html>
<head>
    <title>Customer Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: purple;
            color: black;
            text-align: center;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 20px 30px;
        }

        .welcome-section h1 {
            margin: 0 0 10px 0;
        }

        .account-box {
            background-color: white;
            border: 2px solid black;
            padding: 15px;
            width: 260px;
        }

        .button-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            padding: 0 30px 20px 30px;
        }

        .dashboard-btn {
            padding: 15px 25px;
            font-size: 16px;
            border: 2px solid black;
            background-color: #999;
            cursor: pointer;
            min-width: 180px;
        }

        .content-box {
            background-color: white;
            border: 2px solid black;
            margin: 0 30px 30px 30px;
            padding: 20px;
        }

        footer {
            background-color: purple;
            color: black;
            text-align: center;
            padding: 20px;
            font-weight: bold;
            margin-top: 40px;
        }
    </style>
</head>

<body>
<header>Legacy Auto Company</header>

<div class="top-bar">
    <div class="welcome-section">
        <h1>Customer Dashboard</h1>
        <p id="welcomeMessage"><strong>Loading user data...</strong></p>
    </div>

    <div class="account-box">
        <h3>Account Information</h3>
        <p id="accountUsername">Username: </p>
        <p id="accountUserId">User ID: </p>
    </div>
</div>

<div class="button-row">
    <button class="dashboard-btn" onclick="window.location.href='/Sprint2Alberto/VehicleCreationPage.html'">
        Create Vehicle
    </button>

    <button class="dashboard-btn" onclick="window.location.href='/Sprint2Alberto/PreviousCreationPage.html'">
        Previous Builds
    </button>

    <button class="dashboard-btn" onclick="window.location.href='/Sprint2-Charles/PartsPage.html'">
        Parts
    </button>

    <button class="dashboard-btn" onclick="window.location.href='/Sprint2-Charles/TradesPage.html'">
        Trades
    </button>

    <button class="dashboard-btn" onclick="window.location.href='/Sprint2Alberto/OurPartnersPage.html'">
        Our Partners
    </button>
    
    <button class="dashboard-btn" onclick="logoutUser()">
        Logout
    </button>
</div>

<div class="content-box">
    <h2>Saved Vehicle Configurations</h2>
    <p id="savedBuildsMessage">No saved builds loaded yet.</p>

    <br>
    <button onclick="window.location.href='/Sprint2-Charles/SavedConfigurations.html'">
        View
    </button>
</div>

<footer>
This is Legacy Auto Comp!!!!! we are excited to bring you a new perspective on creativity and home to build your vision
</footer>

<script>
const params = new URLSearchParams(window.location.search);
const userId = params.get("userId");

if (!userId) {
    window.location.replace("/Sprint2Alberto/CustomerSingInPage.html");
}

async function loadCustomer() {
    try {
        const res = await fetch("/customer/" + userId);
        const data = await res.json();

        document.getElementById("welcomeMessage").innerText =
            "Welcome " + data.UserName + " (ID: " + data.UserID + ")";

        document.getElementById("accountUsername").innerText =
            "Username: " + data.UserName;

        document.getElementById("accountUserId").innerText =
            "User ID: " + data.UserID;

    } catch (err) {
        console.error(err);
        document.getElementById("welcomeMessage").innerText =
            "Error loading user data.";
    }
}

async function loadSavedBuilds() {

    try {

        const res = await fetch("/cars/" + userId);
        const builds = await res.json();

        if (builds.length === 0) {
            document.getElementById("savedBuildsMessage").innerText =
                "No saved builds loaded yet.";
        } else {
            document.getElementById("savedBuildsMessage").innerText =
                "You currently have " + builds.length + " saved configurations.";
        }

    } catch (err) {

        document.getElementById("savedBuildsMessage").innerText =
            "Unable to load saved configurations.";

    }

}

loadSavedBuilds();

function logoutUser() {
    localStorage.removeItem("userId");
    localStorage.removeItem("username");
    window.location.replace("/Sprint2Alberto/CustomerSingInPage.html");
}

function goBackToDashboard() {
    const userId = localStorage.getItem("userId");

    if (userId) {
        window.location.href = "/Sprint2-Charles/CustomerDashboard.html?userId=" + userId;
    } else {
        window.location.href = "/Sprint2Alberto/CustomerSingInPage.html";
    }
}

loadCustomer();
</script>

</body>
</html>
