<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard - LegacyAuto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/global-ui.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #07090f; color: #fff; }
        .page-bg { position: fixed; inset: 0; background: radial-gradient(ellipse at 18% 35%, rgba(79,144,240,0.08) 0%, transparent 50%), radial-gradient(ellipse at 82% 70%, rgba(212,168,67,0.04) 0%, transparent 45%), linear-gradient(160deg, #0c1428 0%, #07090f 100%); z-index: 0; }
        
        nav { position: relative; z-index: 50; display: flex; align-items: center; justify-content: space-between; padding: 0 48px; height: 66px; background: rgba(6,8,13,0.92); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255,255,255,0.03); }
        .nav-brand { font-family: 'Orbitron', monospace; font-size: 1.2rem; font-weight: 900; letter-spacing: 4px; color: #fff; text-decoration: none; text-transform: uppercase; }
        .nav-brand span { color: #4f90f0; }
        .nav-right { display: flex; align-items: center; gap: 32px; }
        .user-greeting { font-size: 0.9rem; color: rgba(175,200,245,0.7); }
        .nav-btn { padding: 8px 20px; background: rgba(79,144,240,0.1); border: 1px solid rgba(79,144,240,0.3); border-radius: 50px; color: rgba(175,200,245,0.8); cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s ease; }
        .nav-btn:hover { background: rgba(79,144,240,0.2); color: #fff; }
        
        .dashboard-container { position: relative; z-index: 1; width: 100%; padding: 40px 24px; }
        .welcome-section { margin-bottom: 48px; }
        .welcome-section h1 { font-family: 'Orbitron', monospace; font-size: 2.2rem; font-weight: 900; margin-bottom: 8px; }
        .welcome-section p { color: rgba(175,200,245,0.6); font-size: 1.05rem; }
        
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 48px; width: 100%; }
        .nav-card { background: rgba(12,20,40,0.45); border: none; border-radius: 18px; padding: 32px 26px; cursor: pointer; transition: all 0.35s ease; text-decoration: none; color: inherit; display: flex; flex-direction: column; align-items: center; text-align: center; min-height: 160px; justify-content: center; box-shadow: 0 0 30px rgba(79,144,240,0.15), 0 8px 16px rgba(0,0,0,0.3); }
        .nav-card:hover { background: rgba(79,144,240,0.15); transform: translateY(-6px) scale(1.02); box-shadow: 0 0 50px rgba(79,144,240,0.35), 0 16px 32px rgba(0,0,0,0.4); }
        .nav-card .icon { font-size: 2.2rem; margin-bottom: 12px; }
        .nav-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
        .nav-card p { font-size: 0.8rem; color: rgba(175,200,245,0.6); }
        
        .content-section { background: rgba(12,20,40,0.45); border: none; border-radius: 20px; padding: 32px; margin-bottom: 24px; width: 100%; box-shadow: 0 0 30px rgba(79,144,240,0.12), 0 8px 16px rgba(0,0,0,0.3); }
        .content-section h2 { font-family: 'Orbitron', monospace; font-size: 1.4rem; font-weight: 900; margin-bottom: 16px; }
        .content-section p { color: rgba(175,200,245,0.7); line-height: 1.6; }
        .view-btn { display: inline-block; margin-top: 16px; padding: 10px 28px; background: linear-gradient(135deg, #4f90f0 0%, #6faeff 100%); border: none; border-radius: 50px; color: #fff; font-weight: 600; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 0 15px rgba(79,144,240,0.4), 0 4px 12px rgba(79,144,240,0.25); }
        .view-btn:hover { transform: translateY(-3px); box-shadow: 0 0 25px rgba(79,144,240,0.6), 0 8px 16px rgba(79,144,240,0.35); }
        
        @media (max-width: 768px) { .dashboard-grid { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); } }
        @media (max-width: 480px) { .dashboard-grid { grid-template-columns: 1fr 1fr; } nav { padding: 0 20px; } }
    </style>
</head>
<body>
    <div class="page-bg"></div>
    
    <nav>
        <a class="nav-brand" href="/">LEGACY<span>AUTO</span></a>
        <div class="nav-right">
            <span class="user-greeting" id="greetingText">Welcome</span>
            <button class="nav-btn" onclick="logoutUser()">Sign Out</button>
        </div>
    </nav>
    
    <div class="dashboard-container">
        <div class="welcome-section">
            <h1>Your Dashboard</h1>
            <p id="welcomeMessage">Welcome back! Here's your personalized experience.</p>
        </div>
        
        <div class="dashboard-grid">
            <button class="nav-card" onclick="window.location.href='/Sprint2Alberto/VehicleCreationPage.html'" style="border-color: rgba(79,144,240,0.25); background: rgba(79,144,240,0.08);">
                <div class="icon">🏗️</div>
                <h3>Build Vehicle</h3>
                <p>Create a new custom build</p>
            </button>
            
            <button class="nav-card" onclick="window.location.href='/Sprint2Alberto/PreviousCreationPage.html'">
                <div class="icon">📋</div>
                <h3>Previous Builds</h3>
                <p>View your past creations</p>
            </button>
            
            <button class="nav-card" onclick="window.location.href='/Sprint2-Charles/PartsPage.html'">
                <div class="icon">⚙️</div>
                <h3>Parts Catalog</h3>
                <p>Browse available parts</p>
            </button>
            
            <button class="nav-card" onclick="window.location.href='/Sprint2-Charles/TradesPage.html?userId=' + userId" style="border-color: rgba(212,168,67,0.25); background: rgba(212,168,67,0.08);">
                <div class="icon">🔄</div>
                <h3>Trade Market</h3>
                <p>Buy and sell parts with users</p>
            </button>
            
            <button class="nav-card" onclick="window.location.href='/Sprint2Alberto/OurPartnersPage.html'">
                <div class="icon">🤝</div>
                <h3>Partners</h3>
                <p>View our trusted partners</p>
            </button>
            
            <button class="nav-card" onclick="window.location.href='/Sprint2-Charles/SavedConfigurations.html'">
                <div class="icon">💾</div>
                <h3>Saved Configs</h3>
                <p>Your vehicle configurations</p>
            </button>
        </div>
        
        <div class="content-section">
            <h2>📊 Your Saved Builds</h2>
            <p id="savedBuildsMessage">Loading your configurations...</p>
            <button class="view-btn" onclick="window.location.href='/Sprint2-Charles/SavedConfigurations.html'">View All →</button>
        </div>
        
        <div class="content-section">
            <h2>👤 Account Information</h2>
            <p id="accountInfo">Loading your profile...</p>
        </div>
    </div>
    
    <script>
        const params = new URLSearchParams(window.location.search);
        const userId = params.get("userId");

        if (!userId) {
            window.location.replace("/Sprint2Alberto/CustomerSingInPage.html");
        }

        async function loadCustomer() {
            try {
                const res = await fetch("/customer/" + userId);
                const data = await res.json();

                document.getElementById("greetingText").innerText = "Welcome back, " + data.UserName;
                document.getElementById("welcomeMessage").innerText = "You have a great day ahead!";
                document.getElementById("accountInfo").innerHTML = `
                    <strong>Username:</strong> ${data.UserName}<br>
                    <strong>User ID:</strong> ${data.UserID}
                `;

            } catch (err) {
                console.error(err);
                document.getElementById("greetingText").innerText = "Welcome";
                document.getElementById("accountInfo").innerText = "Error loading profile.";
            }
        }

        async function loadSavedBuilds() {
            try {
                const res = await fetch("/cars/" + userId);
                const builds = await res.json();

                if (builds.length === 0) {
                    document.getElementById("savedBuildsMessage").innerText = "You haven't created any vehicle configurations yet. Start by building your first custom vehicle!";
                } else {
                    document.getElementById("savedBuildsMessage").innerHTML = "You currently have <strong>" + builds.length + " saved configuration" + (builds.length !== 1 ? "s" : "") + "</strong>. View them in the Saved Configurations page.";
                }
            } catch (err) {
                document.getElementById("savedBuildsMessage").innerText = "Unable to load your saved configurations.";
            }
        }

        function logoutUser() {
            localStorage.removeItem("userId");
            localStorage.removeItem("username");
            window.location.replace("/Sprint2Alberto/CustomerSingInPage.html");
        }

        loadCustomer();
        loadSavedBuilds();
    </script>
</body>
</html>
