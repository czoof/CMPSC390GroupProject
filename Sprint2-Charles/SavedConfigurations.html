<!DOCTYPE html>
<html>
<head>
  <title>Saved Configurations</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: purple;
      color: black;
      text-align: center;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }

    .container {
      background: white;
      border: 2px solid black;
      margin: 30px;
      padding: 20px;
    }

    .car {
      border-bottom: 1px solid black;
      padding: 10px 0;
    }

    .car-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    button {
      padding: 12px 20px;
      border: 2px solid black;
      background: #999;
      cursor: pointer;
      margin-top: 20px;
    }

    footer {
      background: purple;
      color: black;
      text-align: center;
      padding: 20px;
      font-weight: bold;
      margin-top: 40px;
    }
  </style>

</head>

<body>

<header>Legacy Auto Company</header>

<div class="container">

  <h2>Saved Vehicle Configurations</h2>

  <div id="carsList">
    Loading configurations...
  </div>

  <button onclick="window.location.href='/Sprint2-Charles/CustomerDashboard.html?userId=' + localStorage.getItem('userId')">
    Back to Dashboard
  </button>

</div>

<footer>
This is Legacy Auto Comp!!!!! we are excited to bring you a new perspective on creativity and home to build your vision
</footer>

<script>

const userId = localStorage.getItem("userId");
const API_BASE = `${window.location.protocol}//${window.location.hostname}:3000`;

async function updateBuildStatus(carId, buildStatus) {
  const response = await fetch(`${API_BASE}/cars/${carId}/status`, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      userId,
      buildStatus
    })
  });

  if (!response.ok) {
    const errText = await response.text();
    throw new Error(errText || "Status update failed");
  }
}

async function loadCars() {

  try {

    const res = await fetch(`${API_BASE}/cars/` + userId);
    const cars = await res.json();

    const container = document.getElementById("carsList");
    container.innerHTML = "";

    if (cars.length === 0) {
      container.innerText = "No saved configurations.";
      return;
    }

    cars.forEach(c => {

      const div = document.createElement("div");
      div.className = "car";

      const partsText = Array.isArray(c.Parts) && c.Parts.length
        ? c.Parts.map(p => `${p.Name} (ID: ${p.PartID})`).join(", ")
        : (c.PartID ? `Part ${c.PartID}` : "None");

      div.innerHTML =
        "<strong>Vehicle:</strong> " + c.BaseCar +
        "<br><strong>Total Price:</strong> $" + c.TotalPrice +
        "<br><strong>Parts:</strong> " + partsText;

      const actions = document.createElement("div");
      actions.className = "car-actions";

      const removeBtn = document.createElement("button");
      removeBtn.textContent = "Remove Build";
      removeBtn.addEventListener("click", async () => {
        const confirmed = window.confirm("Remove this saved configuration?");
        if (!confirmed) {
          return;
        }

        try {
          const deleteRes = await fetch(`${API_BASE}/cars/${c.CarID}?userId=${encodeURIComponent(userId)}`, {
            method: "DELETE"
          });

          if (!deleteRes.ok) {
            const errText = await deleteRes.text();
            throw new Error(errText || "Delete failed");
          }

          await loadCars();
        } catch (deleteErr) {
          console.error(deleteErr);
          alert("Could not remove configuration right now.");
        }
      });

      const buyBtn = document.createElement("button");
      buyBtn.textContent = "Mark as Bought";
      buyBtn.addEventListener("click", async () => {
        try {
          await updateBuildStatus(c.CarID, "BOUGHT");
          await loadCars();
        } catch (buyErr) {
          console.error(buyErr);
          alert("Could not move configuration to bought builds right now.");
        }
      });

      container.appendChild(div);
      actions.appendChild(removeBtn);
      actions.appendChild(buyBtn);
      container.appendChild(actions);

    });

  } catch (err) {

    document.getElementById("carsList").innerText =
      "Error loading configurations.";

  }

}

loadCars();

</script>

</body>
</html>
