<!DOCTYPE html>
<html>
<head>
  <title>Saved Configurations</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: purple;
      color: black;
      text-align: center;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }

    .container {
      background: white;
      border: 2px solid black;
      margin: 30px;
      padding: 20px;
    }

    .car {
      border-bottom: 1px solid black;
      padding: 10px 0;
    }

    button {
      padding: 12px 20px;
      border: 2px solid black;
      background: #999;
      cursor: pointer;
      margin-top: 20px;
    }

    footer {
      background: purple;
      color: black;
      text-align: center;
      padding: 20px;
      font-weight: bold;
      margin-top: 40px;
    }
  </style>

</head>

<body>

<header>Legacy Auto Company</header>

<div class="container">

  <h2>Saved Vehicle Configurations</h2>

  <div id="carsList">
    Loading configurations...
  </div>

  <button onclick="window.location.href='/Sprint2-Charles/CustomerDashboard.html?userId=' + localStorage.getItem('userId')">
    Back to Dashboard
  </button>

</div>

<footer>
This is Legacy Auto Comp!!!!! we are excited to bring you a new perspective on creativity and home to build your vision
</footer>

<script>

const userId = localStorage.getItem("userId");

async function loadCars() {

  try {

    const res = await fetch("/cars/" + userId);
    const cars = await res.json();

    const container = document.getElementById("carsList");
    container.innerHTML = "";

    if (cars.length === 0) {
      container.innerText = "No saved configurations.";
      return;
    }

    cars.forEach(c => {

      const div = document.createElement("div");
      div.className = "car";

      div.innerHTML =
        "<strong>Vehicle:</strong> " + c.BaseCar +
        "<br><strong>Total Price:</strong> $" + c.TotalPrice +
        "<br><strong>Part ID:</strong> " + c.PartID;

      container.appendChild(div);

    });

  } catch (err) {

    document.getElementById("carsList").innerText =
      "Error loading configurations.";

  }

}

loadCars();

</script>

</body>
</html>
