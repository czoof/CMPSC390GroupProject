<!DOCTYPE html>
<html>
<head>
<title>Trade Marketplace</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Inter', sans-serif; background: #07090f; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }
      .page-bg { position: fixed; inset: 0; background: radial-gradient(ellipse at 18% 35%, rgba(79,144,240,0.08) 0%, transparent 50%), radial-gradient(ellipse at 82% 70%, rgba(212,168,67,0.04) 0%, transparent 45%), linear-gradient(160deg, #0c1428 0%, #07090f 100%); z-index: 0; }
      header { position: relative; z-index: 10; display: flex; align-items: center; justify-content: center; padding: 24px; font-family: 'Orbitron', monospace; font-size: 1.25rem; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; }
      header span { color: #4f90f0; }
      .container { position: relative; z-index: 1; width: min(760px, calc(100% - 32px)); margin: 30px auto; padding: 40px 44px; background: rgba(12,20,40,0.5); border: none; border-radius: 24px; box-shadow: 0 0 60px rgba(79,144,240,0.18), 0 20px 40px rgba(0,0,0,0.5); }
      .left.section { width: 100%; align-items: stretch; }
      .container h2 { font-family: 'Orbitron', monospace; font-size: 2rem; font-weight: 900; text-align: center; margin: 0 0 26px 0; }
      .container h3 { font-size: 1.1rem; margin: 6px 0 14px 0; color: #d9e7ff; }
      select, input { width: 100%; padding: 13px 16px; background: rgba(255,255,255,0.08); border: none !important; border-radius: 10px; color: #fff; font-family: 'Inter', sans-serif; font-size: 0.95rem; margin-bottom: 14px; box-shadow: none !important; }
      select { appearance: none; -webkit-appearance: none; -moz-appearance: none; background-image: linear-gradient(45deg, transparent 50%, #c9dcff 50%), linear-gradient(135deg, #c9dcff 50%, transparent 50%); background-position: calc(100% - 18px) calc(50% - 3px), calc(100% - 12px) calc(50% - 3px); background-size: 6px 6px, 6px 6px; background-repeat: no-repeat; padding-right: 34px; }
      select:focus, input:focus { outline: none; background: rgba(79,144,240,0.2); box-shadow: 0 0 0 2px rgba(111,174,255,0.45); }
      select option { background: #dfe8fb; color: #0d1730; }
      #trades input[id^='offer'] { width: 100%; display: block; margin: 10px 0 8px; }
      button { padding: 12px 28px; background: linear-gradient(135deg, #4f90f0 0%, #6faeff 100%); border: none !important; border-radius: 10px; color: #fff; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.95rem; transition: all 0.25s ease; box-shadow: 0 0 18px rgba(79,144,240,0.35); margin-top: 8px; margin-right: 8px; }
      button:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(79,144,240,0.5); }
      .action-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
      .danger { background: linear-gradient(135deg, #ca4a3f 0%, #e35c49 100%); box-shadow: 0 0 18px rgba(227,92,73,0.35); }
      #trades { margin-top: 26px; display: flex; flex-direction: column; gap: 10px; }
      #trades img { border-radius: 8px; margin-bottom: 6px; }
      #trades > div.trade-row { background: rgba(79,144,240,0.1); border: none; border-radius: 12px; padding: 12px; }
      footer { position: relative; z-index: 1; text-align: center; padding: 32px 24px; border-top: 1px solid rgba(79,144,240,0.1); color: rgba(175,200,245,0.6); font-size: 0.85rem; margin-top: auto; }
    </style>
</head>

<body>
<div class="page-bg"></div>
<header>LEGACY<span>AUTO</span></header>

<div class="container">

<div class="left section">

<h2>Trade Marketplace</h2>

<h3>Create Trade</h3>

<select id="partID"></select>

<input id="minPrice" placeholder="Minimum Price">

<input id="maxPrice" placeholder="Maximum Price">

<input id="condition" placeholder="Condition">

<input id="imageURL" placeholder="Image URL">

<div class="action-row">
<button onclick="createTrade()">Post Trade</button>
<button onclick="loadTrades()">Load Available Trades</button>
<button class="danger" onclick="clearTrades()">Remove All Trades</button>
<button onclick="window.location.href='/Sprint2-Charles/CustomerDashboard.html?userId=' + getCurrentUserId()">Go back</button>
</div>

<div id="trades"></div>

</div>

</div>

<footer>
<p>Trade parts with other users!</p>
</footer>

<script>
function getCurrentUserId(){
const params = new URLSearchParams(window.location.search);
const queryUserId = params.get("userId");
if (queryUserId) {
return parseInt(queryUserId, 10);
}
return parseInt(localStorage.getItem("userId"), 10);
}

const activeUserId = getCurrentUserId();
const expandedTradeIds = new Set();
const offerDrafts = {};
let isLoadingTrades = false;
let lastTradesSnapshot = "";
if (!activeUserId) {
window.location.href = "/Sprint2Alberto/CustomerSingInPage.html";
}

function isTypingOfferInput(){
const active = document.activeElement;
return active && active.id && active.id.startsWith("offer");
}

function captureOfferDrafts(){
document.querySelectorAll("input[id^='offer']").forEach(input => {
offerDrafts[input.id] = input.value;
});
}

function restoreOfferDrafts(){
Object.keys(offerDrafts).forEach(inputId => {
const input = document.getElementById(inputId);
if (input && input.value !== offerDrafts[inputId]) {
input.value = offerDrafts[inputId];
}
});
}

async function requestJson(url, options = {}){
const response = await fetch(url, options);
const data = await response.json();

if (!response.ok) {
throw new Error(data.message || data.error || "Request failed");
}

return data;
}

function buildTradesSnapshot(trades){
return JSON.stringify(trades.map(trade => ({
TradeID: trade.TradeID,
OwnerUserID: trade.OwnerUserID,
OfferedPartID: trade.OfferedPartID,
DesiredMinPrice: trade.DesiredMinPrice,
DesiredMaxPrice: trade.DesiredMaxPrice,
ConditionDescription: trade.ConditionDescription,
ImageURL: trade.ImageURL,
PartName: trade.PartName,
UserName: trade.UserName
})));
}

function renderTrades(data){

let output = "";
const currentUser = activeUserId;

if (!data.length) {
document.getElementById("trades").innerHTML = "<p>No open trades right now.</p>";
return;
}

data.forEach(trade => {

output += `<div class="trade-row">
<p><strong>Posted by:</strong> ${trade.UserName}</p>

<p><strong>Part:</strong> ${trade.PartName || "Unknown Part"}</p>

<p>Part ID: ${trade.OfferedPartID}</p>
<p>Condition: ${trade.ConditionDescription}</p>
<p>Price Range: ${trade.DesiredMinPrice} - ${trade.DesiredMaxPrice}</p>
`;

if(currentUser === trade.OwnerUserID){

output += `
<button onclick="viewOffers(${trade.TradeID})">View Offers</button>
<div id="offers${trade.TradeID}"></div>
`;

}else{

output += `
<input id="offer${trade.TradeID}" placeholder="Describe your part">
<button onclick="submitOffer(${trade.TradeID})">Offer Trade</button>
`;

}

output += `</div>`;

});

document.getElementById("trades").innerHTML = output;

restoreOfferDrafts();

document.querySelectorAll("input[id^='offer']").forEach(input => {
input.addEventListener("input", () => {
offerDrafts[input.id] = input.value;
});
});

expandedTradeIds.forEach(tradeId => {
if (document.getElementById("offers" + tradeId)) {
viewOffers(tradeId, true);
}
});
}

function loadTrades(force = false){

if (isLoadingTrades) {
return;
}

captureOfferDrafts();
isLoadingTrades = true;

requestJson("/trades")
.then(data => {
const snapshot = buildTradesSnapshot(data);

if (!force && snapshot === lastTradesSnapshot) {
expandedTradeIds.forEach(tradeId => {
if (document.getElementById("offers" + tradeId)) {
viewOffers(tradeId, true);
}
});
return;
}

lastTradesSnapshot = snapshot;
renderTrades(data);

})
.catch(err => {
document.getElementById("trades").innerHTML = `<p>${err.message}</p>`;
})
.finally(() => {
isLoadingTrades = false;
});

}

function createTrade(){

const minPrice = document.getElementById("minPrice").value;
const maxPrice = document.getElementById("maxPrice").value;

if (!document.getElementById("partID").value) {
alert("Select a part first.");
return;
}

if (!minPrice || !maxPrice) {
alert("Enter both minimum and maximum price.");
return;
}

requestJson("/createTrade", {

method: "POST",

headers: {
"Content-Type": "application/json"
},

body: JSON.stringify({

OwnerUserID: activeUserId,

OfferedPartID: document.getElementById("partID").value,

DesiredMinPrice: document.getElementById("minPrice").value,

DesiredMaxPrice: document.getElementById("maxPrice").value,

ConditionDescription: document.getElementById("condition").value,

ImageURL: document.getElementById("imageURL").value

})

})

.then(data => {
alert(data.message);
loadTrades();
})
.catch(err => alert(err.message));

}

function loadParts(){

requestJson("/parts")
.then(data => {

let options = "";

data.forEach(part => {

const partLabel = part.Name || part.PartName || (`Part ${part.PartID}`);
options += `<option value="${part.PartID}">${partLabel}</option>`;

});

document.getElementById("partID").innerHTML = options;

})
.catch(err => {
document.getElementById("partID").innerHTML = `<option value="">${err.message}</option>`;
});

}

loadParts();

function submitOffer(tradeId){

const description = document.getElementById("offer" + tradeId).value;

if (!description.trim()) {
alert("Describe your trade offer first.");
return;
}

requestJson("/createOffer", {

method: "POST",

headers: {
"Content-Type": "application/json"
},

body: JSON.stringify({

TradeID: tradeId,
OfferingUserID: activeUserId,
OfferedPartDescription: description

})

})
.then(data => {
delete offerDrafts["offer" + tradeId];
alert(data.message);
loadTrades();
})
.catch(err => alert(err.message));

}

function viewOffers(tradeId, keepOpen = false){

expandedTradeIds.add(tradeId);

requestJson("/offers/" + tradeId)

.then(data => {

let output = "<h4>Offers:</h4>";

if (!data.length) {
output += "<p>No offers yet.</p>";
document.getElementById("offers" + tradeId).innerHTML = output;
return;
}

data.forEach(offer => {

output += `
<p><strong>Offer from:</strong> ${offer.UserName}</p>
<p>${offer.OfferedPartDescription}</p>

<button onclick="acceptOffer(${offer.OfferID}, ${tradeId})">Accept Offer</button>
<button onclick="declineOffer(${offer.OfferID})">Decline Offer</button>

<hr>
`;

});

document.getElementById("offers" + tradeId).innerHTML = output;

})
.catch(err => {
if (!keepOpen) {
expandedTradeIds.delete(tradeId);
}
document.getElementById("offers" + tradeId).innerHTML = `<p>${err.message}</p>`;
});

}

function acceptOffer(offerId, tradeId){

requestJson("/acceptOffer/" + offerId, {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
userId: activeUserId
})
})
.then(data => {
expandedTradeIds.delete(tradeId);
alert(data.message);
loadTrades();
})
.catch(err => alert(err.message));

}

function logout(){

localStorage.removeItem("userId");
localStorage.removeItem("username");

window.location.href = "/Sprint2Alberto/CustomerSingInPage.html";

}

function declineOffer(offerId){

requestJson("/declineOffer/" + offerId, {
method: "POST"
})
.then(data => {
alert(data.message);
loadTrades();
})
.catch(err => alert(err.message));

}

function clearTrades(){

if(!confirm("Remove all trades and offers?")){
return;
}

requestJson("/clearTrades", {
method: "POST"
})
.then(data => {
alert(data.message || "All trades removed.");
expandedTradeIds.clear();
loadTrades();
})
.catch(err => alert(err.message));

}

loadTrades();
setInterval(() => {
if (!isTypingOfferInput()) {
loadTrades();
}
}, 3000);
</script>

</body>
</html>
