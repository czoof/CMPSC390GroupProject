<!DOCTYPE html>
<html>
<head>
    <title>Customer Create Account Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: purple;
            color: black;
            text-align: center;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
        }

        .signup-container {
            width: 450px;
            margin: 50px auto;
            background-color: white;
            border: 2px solid black;
            padding: 30px;
        }

        .signup-container h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
        }

        .signup-container label {
            font-weight: bold;
        }

        .signup-container input {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 18px;
            border: 2px solid black;
            box-sizing: border-box;
            font-size: 16px;
        }

        .signup-btn,
        .back-btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 2px solid black;
            background-color: #999;
            cursor: pointer;
            margin-bottom: 15px;
        }

        footer {
            background-color: purple;
            color: black;
            text-align: center;
            padding: 20px;
            font-weight: bold;
            margin-top: 40px;
        }
    </style>
</head>

<body>

<header>Legacy Auto Company</header>

<div class="signup-container">

    <h2>Create Customer Account</h2>

    <!--The customer account creation form-->
    <form id="signupForm">

        <label>First Name</label><br>
        <input type="text" id="firstName" required><br>

        <label>Last Name</label><br>
        <input type="text" id="lastName" required><br>

        <label>Username</label><br>
        <input type="text" id="userName" required><br>

        <label>Password</label><br>
        <input type="password" id="password" required><br>

        <label>Zip Code</label><br>
        <input type="text" id="zipCode" required><br>

        <label>Birthdate</label><br>
        <input type="date" id="birthdate" required><br>

        <button class="signup-btn" type="submit">Create Account</button>

    </form>

    <button class="back-btn" onclick="window.location.href='/Sprint2Alberto/CustomerSingInPage.html'">Go back</button>

</div>

<footer>
This is legacy Auto Comp!!!!! we are excited to bring you a new perspective on creativity and home to build your vision
</footer>

<!--Connecting the backend with the sign up data-->
<script>

const form = document.getElementById("signupForm");

form.addEventListener("submit", async (e) => {

    e.preventDefault();

    const firstName = document.getElementById("firstName").value;
    const lastName = document.getElementById("lastName").value;
    const userName = document.getElementById("userName").value;
    const password = document.getElementById("password").value;
    const zipCode = document.getElementById("zipCode").value;
    const birthdate = document.getElementById("birthdate").value;

    const res = await fetch("/customer/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            firstName,
            lastName,
            userName,
            password,
            zipCode,
            birthdate
        })
    });

    const data = await res.json();

    if (!res.ok) {
        alert(data.message || "Account creation failed");
        return;
    }

    alert("Account created successfully. Redirecting to dashboard...");

    localStorage.setItem("userId", data.userId);
    localStorage.setItem("username", data.username);

    window.location.replace("/Sprint2-Charles/CustomerDashboard.html?userId=" + data.userId);

});

</script>

</body>
</html>
