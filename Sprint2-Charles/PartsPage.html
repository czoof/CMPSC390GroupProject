<!DOCTYPE html>
<html>
<head>
  <title>Pick a Part</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; margin: 0; background: #f4f4f4; }
    header {
      background: purple;
      color: black;
      text-align: center;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }
    .container {
      background: white;
      border: 2px solid black;
      margin: 30px;
      padding: 20px;
    }
    .filters { margin-bottom: 18px; display: flex; flex-wrap: wrap; gap: 12px; }
    .part { border: 1px solid #005296; padding: 10px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; background: #fff; }
    .part img { width: 110px; height: 90px; object-fit: contain; border: 1px solid #ccc; background: #f8f8f8; }
    .info h3 { margin: 0 0 5px 0; }
    .out { color: #b00020; }
    #cartContainer { border: 1px solid #ffcf8f; padding: 10px; margin-top: 10px; background: #fffdf7; }
    .cart-item { display: flex; justify-content: space-between; margin-bottom: 5px; gap: 10px; }
    button { padding: 8px 12px; cursor: pointer; border: 1px solid #444; }
    .top-actions { margin-top: 14px; }
    footer {
      background: purple;
      color: black;
      text-align: center;
      padding: 20px;
      font-weight: bold;
      margin-top: 40px;
    }
  </style>
</head>
<body>

<header>Legacy Auto Company</header>

<div class="container">
  <h1>Pick a Part</h1>

  <div class="filters">
    <label><input type="checkbox" id="inStockCheckbox"> In Stock Only</label>
    <label><input type="checkbox" id="bufferCheckbox"> Buffer</label>
    <label><input type="checkbox" id="paintCheckbox"> Paint</label>
    <label><input type="checkbox" id="engineCheckbox"> Engine</label>
    <label><input type="checkbox" id="wheelCheckbox"> Wheel</label>
    <label><input type="checkbox" id="hornCheckbox"> Horn</label>
    <label><input type="checkbox" id="exhaustsystemCheckbox"> Exhaust system</label>
  </div>

  <h2>Parts</h2>
  <h5>Select the parts you want to modify your dream car</h5>
  <div id="partsContainer">Loading parts...</div>

  <h2>Cart (Going to Car)</h2>
  <div id="cartContainer"></div>
  <p><strong>Total: $<span id="cartTotal">0.00</span></strong></p>

  <div class="top-actions">
    <button onclick="window.location.href='/Sprint2-Charles/CustomerDashboard.html?userId=' + localStorage.getItem('userId')">Back to Dashboard</button>
  </div>
</div>

<footer>
  This is Legacy Auto Comp!!!!! we are excited to bring you a new perspective on creativity and home to build your vision
</footer>

<script>
let parts = [];
let cart = [];

function fetchParts() {
  let url = "/api/parts?";
  const params = [];

  if (document.getElementById("inStockCheckbox").checked) params.push("inStock=true");

  // Keep the same behavior as your earlier page: if multiple categories are checked,
  // the last checked one in this order is used by the API.
  if (document.getElementById("bufferCheckbox").checked) params.push("category=buffer");
  if (document.getElementById("paintCheckbox").checked) params.push("category=paint");
  if (document.getElementById("engineCheckbox").checked) params.push("category=engine");
  if (document.getElementById("wheelCheckbox").checked) params.push("category=wheel");
  if (document.getElementById("hornCheckbox").checked) params.push("category=horn");
  if (document.getElementById("exhaustsystemCheckbox").checked) params.push("category=exhaust system");

  url += params.join("&");

  fetch(url)
    .then(res => res.json())
    .then(data => {
      parts = data;
      displayParts();
    })
    .catch(() => {
      document.getElementById("partsContainer").innerText = "Error loading parts.";
    });
}

function displayParts() {
  const container = document.getElementById("partsContainer");
  container.innerHTML = "";

  parts.forEach(part => {
    const div = document.createElement("div");
    div.className = "part";

    const img = document.createElement("img");
    img.src = part.Image || "https://via.placeholder.com/110x90?text=No+Image";
    img.alt = part.Name || ("Part #" + part.PartID);

    const info = document.createElement("div");
    info.className = "info";

    const name = document.createElement("h3");
    name.textContent = part.Name || ("Part #" + part.PartID);
    if (Number(part.Stock) === 0) name.classList.add("out");

    const price = document.createElement("p");
    price.textContent = "Price: $" + Number(part.Price || 0).toFixed(2);

    const category = document.createElement("p");
    category.textContent = "Category: " + (part.Category || "N/A");

    const stock = document.createElement("p");
    stock.textContent = "Stock: " + Number(part.Stock || 0);

    info.appendChild(name);
    info.appendChild(price);
    info.appendChild(category);
    info.appendChild(stock);

    const button = document.createElement("button");
    if (Number(part.Stock) === 0) {
      button.textContent = "Out of Stock";
      button.disabled = true;
    } else {
      button.textContent = "Add to Cart";
      button.onclick = () => addToCart(part);
    }

    div.appendChild(img);
    div.appendChild(info);
    div.appendChild(button);

    container.appendChild(div);
  });
}

function addToCart(part) {
  const exists = cart.find(item => item.PartID === part.PartID);
  if (!exists) cart.push(part);
  displayCart();
}

function removeFromCart(partId) {
  cart = cart.filter(item => item.PartID !== partId);
  displayCart();
}

function displayCart() {
  const container = document.getElementById("cartContainer");
  container.innerHTML = "";

  let total = 0;

  cart.forEach(item => {
    const div = document.createElement("div");
    div.className = "cart-item";

    const label = document.createElement("span");
    label.textContent = (item.Name || ("Part #" + item.PartID)) + " ($" + Number(item.Price || 0).toFixed(2) + ")";
    total += Number(item.Price || 0);

    const removeBtn = document.createElement("button");
    removeBtn.textContent = "Remove";
    removeBtn.onclick = () => removeFromCart(item.PartID);

    div.appendChild(label);
    div.appendChild(removeBtn);
    container.appendChild(div);
  });

  document.getElementById("cartTotal").textContent = total.toFixed(2);
}

document.querySelectorAll("input[type=checkbox]").forEach(cb => cb.addEventListener("change", fetchParts));
fetchParts();
</script>

</body>
</html>
