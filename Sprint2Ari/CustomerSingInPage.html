<!DOCTYPE html>
<html>
    <head>
        <title>Customer SignIn Page</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="styles.css">
    </head>
    
    <body>
        <header><h1>Legacy Auto Company</h1></header>
        
        <div class = "container" style="justify-content: center;">
            <div >
                <h2 style = "text-align: center">Customer SignIn Page</h2>
                
                    <!--This comes from lab 1-->
                <form id="loginForm">
                <label>Username</label><br>
                <input type="text" name="username" required /><br><br>
                
                <label>Password</label><br>
                <input type = "password" name="password" required /><br><br>
                
                <button type = "submit">Login</button><br>
                <br><br>
                Dont have an account? <A href="index.html">XXXXXXXXX</a>
                <br><br>
                <br><br>
  </form>
                <button onclick = "window.location.href='index.html'">Go back</button>
            </div>
            
        </div>
        
        <footer><h2>This is legacy Auto Comp!!!!! we are excited to bring you a new perspective on creativity and home to build your vision</h2></footer>
    
        <script>

document.getElementById("loginForm").addEventListener("submit", function(e){

e.preventDefault();

const formData = new FormData(this);

const username = formData.get("username");
const password = formData.get("password");

fetch("/login", {

method: "POST",

headers: {
"Content-Type": "application/json"
},

body: JSON.stringify({
username: username,
password: password
})

})

.then(res => res.json())

.then(data => {

if(data.userId){

// save user session
localStorage.setItem("userId", data.userId);
localStorage.setItem("username", data.username);

window.location.href = "index.html";

}else{

alert(data.message || "Login failed");

}

});

});

</script>
    </body>
</html>
