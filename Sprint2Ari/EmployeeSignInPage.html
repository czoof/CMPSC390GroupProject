<!DOCTYPE html>
<html>
    <head>
        <title>Employee SignIn Page</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="styles.css">
    </head>
    
    <body>
        <header><h1>Legacy Auto Company</h1></header>
        
        <div class = "container" style="justify-content: center;">
            <div>
               <h2>Employee SignIn Page</h2>

                <h2>Login</h2> <!--This comes from Lab1-->
                    <form id="loginForm">
                        <label>EmployeeID</label><br />
                        <input type="text" name="EmployeeID" required /><br /><br />
                        <label>Password</label><br />
                        <input type="password" name="password" required /><br /><br />
                        <button type="submit">Login</button>
                    </form>
                    <p id="loginResult"></p>

                    <script>
                        const loginForm = document.getElementById('loginForm');
                        const loginResult = document.getElementById('loginResult');
                        loginForm.addEventListener('submit', async (e) => {
                            e.preventDefault();
                            const formData = new FormData(loginForm);
                            const res = await fetch('/login', {
                                method: 'POST',
                                body: new URLSearchParams(formData)
                        });
                        if(res.redirected){
                            window.location.href = res.url;
                            return;
                        }

                        const text = await res.text();
                        loginResult.textContent = text;
                        });
                    </script>



                <button onclick = "window.location.href='index.html'">Go back</button> 
            </div>
            
        </div>

        <footer><h2>This is legacy Auto Comp!!!!! we are excited to bring you a new perspective on creativity and hope to make your vision a reality</h2></footer>

    </body>
</html>
